<style>
  :root {
    --code-bg: #171513;
    --code-panel: #211d19;
    --code-line: rgba(255, 255, 255, 0.14);
    --code-text: #f8efe3;
    --code-muted: #9e968d;
    --code-keyword: #ff7b72;
    --code-type: #ffd166;
    --code-function: #7dd3fc;
    --code-string: #a7f3d0;
    --code-number: #c4b5fd;
    --code-comment: #8a8178;
    --code-operator: #fbbf24;
  }

  .language-java.highlighter-rouge,
  .language-js.highlighter-rouge,
  .codehilite {
    position: relative;
    margin: 1.2rem 0;
    overflow: hidden;
    border: 1px solid var(--code-line);
    border-radius: 8px;
    background: var(--code-bg);
    box-shadow: 0 14px 34px rgba(23, 21, 19, 0.18);
  }

  .language-java.highlighter-rouge::before,
  .language-js.highlighter-rouge::before,
  .codehilite::before {
    display: block;
    padding: 0.55rem 0.85rem;
    border-bottom: 1px solid var(--code-line);
    background:
      linear-gradient(90deg, rgba(255, 209, 102, 0.12), transparent 38%),
      var(--code-panel);
    color: var(--code-muted);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
    content: "Java";
  }

  .language-js.highlighter-rouge::before {
    content: "JavaScript";
  }

  .codehilite.language-js::before {
    content: "JavaScript";
  }

  .highlight,
  .codehilite {
    background: var(--code-bg);
  }

  .highlight pre,
  .codehilite pre,
  pre.highlight {
    margin: 0;
    overflow-x: auto;
    padding: 1rem;
    background: var(--code-bg);
    color: var(--code-text);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: 0.92rem;
    line-height: 1.65;
    tab-size: 4;
  }

  .highlight code,
  .codehilite code,
  pre.highlight code {
    background: transparent;
    color: inherit;
    border: 0;
    padding: 0;
  }

  .highlight .k,
  .highlight .kd,
  .highlight .kn,
  .highlight .kp,
  .highlight .kr,
  .highlight .ow,
  .codehilite .k,
  .codehilite .kd,
  .codehilite .kn,
  .codehilite .kp,
  .codehilite .kr,
  .codehilite .ow {
    color: var(--code-keyword);
    font-weight: 700;
  }

  .highlight .kt,
  .highlight .nc,
  .highlight .nn,
  .codehilite .kt,
  .codehilite .nc,
  .codehilite .nn {
    color: var(--code-type);
    font-weight: 700;
  }

  .highlight .nf,
  .highlight .na,
  .highlight .fm,
  .codehilite .nf,
  .codehilite .na,
  .codehilite .fm {
    color: var(--code-function);
  }

  .highlight .s,
  .highlight .s1,
  .highlight .s2,
  .highlight .sc,
  .highlight .se,
  .codehilite .s,
  .codehilite .s1,
  .codehilite .s2,
  .codehilite .sc,
  .codehilite .se {
    color: var(--code-string);
  }

  .highlight .mi,
  .highlight .mf,
  .highlight .mh,
  .highlight .il,
  .codehilite .mi,
  .codehilite .mf,
  .codehilite .mh,
  .codehilite .il {
    color: var(--code-number);
  }

  .highlight .c,
  .highlight .c1,
  .highlight .cm,
  .highlight .cp,
  .codehilite .c,
  .codehilite .c1,
  .codehilite .cm,
  .codehilite .cp {
    color: var(--code-comment);
    font-style: italic;
  }

  .highlight .o,
  .highlight .p,
  .codehilite .o,
  .codehilite .p {
    color: var(--code-operator);
  }

  .highlight .na,
  .highlight .nd,
  .codehilite .na,
  .codehilite .nd {
    color: #f0abfc;
  }

  @media (max-width: 640px) {
    .highlight pre,
    .codehilite pre,
    pre.highlight {
      padding: 0.85rem;
      font-size: 0.82rem;
    }
  }
</style>
